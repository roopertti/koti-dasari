name: Build and push images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: worker-transport
            dockerfile: apps/worker-transport/Dockerfile
          - service: worker-weather
            dockerfile: apps/worker-weather/Dockerfile
          - service: worker-electricity
            dockerfile: apps/worker-electricity/Dockerfile
          - service: worker-calendar
            dockerfile: apps/worker-calendar/Dockerfile
          - service: worker-news
            dockerfile: apps/worker-news/Dockerfile
          - service: nginx
            dockerfile: infra/nginx/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # Build first, scan with Trivy, only push if the scan passes —
      # so a vulnerable image never reaches GHCR. The second build is a
      # no-op cache hit (same context, same Dockerfile, same labels).
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # Export an OCI image *directory* (tar=false). Trivy cannot read
          # Buildx's OCI tarball, but scans an OCI layout directory via --input.
          outputs: type=oci,dest=/tmp/oci/${{ matrix.service }},tar=false

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/oci/${{ matrix.service }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
