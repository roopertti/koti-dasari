services:
  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
      args:
        VITE_API_BASE: /api
        VITE_API_KEY: ${API_KEY:-}
    image: home-dashboard-nginx
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: home-dashboard-api
    environment:
      DATABASE_PATH: /data/dashboard.db
      API_KEY: ${API_KEY:-}
      PORT: "3001"
      HOST: 0.0.0.0
    volumes:
      - ./data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker-transport:
    build:
      context: .
      dockerfile: apps/worker-transport/Dockerfile
    image: home-dashboard-worker-transport
    environment:
      DATABASE_PATH: /data/dashboard.db
      DIGITRANSIT_API_KEY: ${DIGITRANSIT_API_KEY:?DIGITRANSIT_API_KEY is required}
      HOME_LATITUDE: ${HOME_LATITUDE:-60.1699}
      HOME_LONGITUDE: ${HOME_LONGITUDE:-24.9384}
      TRANSPORT_RADIUS: ${TRANSPORT_RADIUS:-500}
      TRANSPORT_INTERVAL_MS: ${TRANSPORT_INTERVAL_MS:-300000}
    volumes:
      - ./data:/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  worker-weather:
    build:
      context: .
      dockerfile: apps/worker-weather/Dockerfile
    image: home-dashboard-worker-weather
    environment:
      DATABASE_PATH: /data/dashboard.db
      HOME_LATITUDE: ${HOME_LATITUDE:-60.1699}
      HOME_LONGITUDE: ${HOME_LONGITUDE:-24.9384}
      WEATHER_INTERVAL_MS: ${WEATHER_INTERVAL_MS:-1800000}
    volumes:
      - ./data:/data
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
