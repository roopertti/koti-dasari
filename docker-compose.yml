services:
  nginx:
    image: ghcr.io/roopertti/koti-dasari/nginx:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    environment:
      # Injected as proxy_set_header x-api-key on /api/. Must match one of the
      # entries in API_KEYS (or be empty if API auth is disabled).
      KIOSK_API_KEY: ${KIOSK_API_KEY:-}
    ports:
      - "${HOST_PORT:-80}:8080"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: ghcr.io/roopertti/koti-dasari/api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_PATH: /data/dashboard.db
      PORT: "3001"
      HOST: 0.0.0.0
      # Comma-separated client keys. Include KIOSK_API_KEY plus one entry per
      # remote client (second Pi etc). API refuses to boot if empty unless
      # API_AUTH=disabled is set (only safe on a fully trusted network).
      API_KEYS: ${API_KEYS:-}
      API_AUTH: ${API_AUTH:-}
      # Admin login PIN + 64-hex-char session key. Leave both empty to disable admin.
      ADMIN_PIN: ${ADMIN_PIN:-}
      ADMIN_SESSION_KEY: ${ADMIN_SESSION_KEY:-}
      # Seeded into the settings table on first boot (only when the key is
      # missing). Admin-edited values in the table take precedence on restart.
      HOME_LATITUDE: ${HOME_LATITUDE:-60.1699}
      HOME_LONGITUDE: ${HOME_LONGITUDE:-24.9384}
      TRANSPORT_RADIUS: ${TRANSPORT_RADIUS:-500}
      TRANSPORT_INTERVAL_MS: ${TRANSPORT_INTERVAL_MS:-300000}
      WEATHER_INTERVAL_MS: ${WEATHER_INTERVAL_MS:-1800000}
    volumes:
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker-transport:
    image: ghcr.io/roopertti/koti-dasari/worker-transport:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/worker-transport/Dockerfile
    environment:
      DATABASE_PATH: /data/dashboard.db
      DIGITRANSIT_API_KEY: ${DIGITRANSIT_API_KEY:?DIGITRANSIT_API_KEY is required}
      HOME_LATITUDE: ${HOME_LATITUDE:-60.1699}
      HOME_LONGITUDE: ${HOME_LONGITUDE:-24.9384}
      TRANSPORT_RADIUS: ${TRANSPORT_RADIUS:-500}
      TRANSPORT_INTERVAL_MS: ${TRANSPORT_INTERVAL_MS:-300000}
    volumes:
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  worker-weather:
    image: ghcr.io/roopertti/koti-dasari/worker-weather:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/worker-weather/Dockerfile
    environment:
      DATABASE_PATH: /data/dashboard.db
      HOME_LATITUDE: ${HOME_LATITUDE:-60.1699}
      HOME_LONGITUDE: ${HOME_LONGITUDE:-24.9384}
      WEATHER_INTERVAL_MS: ${WEATHER_INTERVAL_MS:-1800000}
    volumes:
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  worker-electricity:
    image: ghcr.io/roopertti/koti-dasari/worker-electricity:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/worker-electricity/Dockerfile
    environment:
      DATABASE_PATH: /data/dashboard.db
    volumes:
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  worker-calendar:
    image: ghcr.io/roopertti/koti-dasari/worker-calendar:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/worker-calendar/Dockerfile
    environment:
      DATABASE_PATH: /data/dashboard.db
    volumes:
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  worker-news:
    image: ghcr.io/roopertti/koti-dasari/worker-news:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/worker-news/Dockerfile
    environment:
      DATABASE_PATH: /data/dashboard.db
      # Override Yle's default major-headlines feed (e.g. for testing).
      NEWS_FEED_URL: ${NEWS_FEED_URL:-}
      # Default cadence is 15 min (900000 ms).
      NEWS_INTERVAL_MS: ${NEWS_INTERVAL_MS:-}
    volumes:
      - ./data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
